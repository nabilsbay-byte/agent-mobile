<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Daily Kaizen</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
    }

    .app {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .logo {
      width: 85%;
      max-width: 360px;
      aspect-ratio: 1 / 1;
      height: auto;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      border: 3px solid white;
    }

    h1 {
      font-size: 24px;
      margin: 0 0 8px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 24px;
    }

    elevenlabs-convai {
      width: 100%;
    }
  </style>
</head>

<body>
  <div class="app">
    <img class="logo" src="./avatar.webp" alt="Avatar agent" />

    <h1>Daily Kaizen</h1>
    <p>Appuie sur le bouton pour démarrer la conversation.</p>

    <elevenlabs-convai
      agent-id="agent_1101ksg9wxndf2qtr4y3s1829a4d"
      avatar-image-url="./avatar.webp"
      variant="expanded"
      dismissible="false"
      action-text="Parler avec l’agent"
      start-call-text="Démarrer l’appel"
      end-call-text="Terminer"
      listening-text="Je vous écoute..."
      speaking-text="L’agent répond...">
    </elevenlabs-convai>
  </div>

  <script
    src="https://unpkg.com/@elevenlabs/convai-widget-embed"
    async
    type="text/javascript">
  </script>
</body>
</html>
